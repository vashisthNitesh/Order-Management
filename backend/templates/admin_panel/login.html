{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block extra_head %}
<style>
  @keyframes blob-dark {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(28px,-36px) scale(1.08); }
    66%      { transform: translate(-22px,22px) scale(0.94); }
  }
  @keyframes card-up {
    from { opacity:0; transform:translateY(32px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes icon-pop {
    from { opacity:0; transform:scale(0.4) rotate(-15deg); }
    to   { opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes slide-in {
    from { opacity:0; transform:translateX(-16px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .anim-card { animation: card-up  0.6s cubic-bezier(.22,1,.36,1) 0.05s both; }
  .anim-icon { animation: icon-pop 0.5s cubic-bezier(.22,1,.36,1) 0.15s both; }
  .anim-head { animation: slide-in 0.45s ease-out 0.25s both; }
  .anim-f1   { animation: slide-in 0.45s ease-out 0.35s both; }
  .anim-f2   { animation: slide-in 0.45s ease-out 0.45s both; }
  .anim-btn  { animation: slide-in 0.45s ease-out 0.55s both; }

  .dark-input {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.11);
    color: #e2e8f0;
    transition: all 0.25s cubic-bezier(.16,1,.3,1);
  }
  .dark-input::placeholder { color: #475569; }
  .dark-input:focus {
    background: rgba(255,255,255,0.11);
    border-color: rgba(16,185,129,0.5);
    outline: none;
    box-shadow: 0 0 0 4px rgba(16,185,129,0.12);
  }
</style>
{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
     style="background: linear-gradient(145deg, #0f172a 0%, #1e293b 55%, #0a2318 100%);">

  <!-- Dark decorative blobs -->
  <div style="position:absolute;top:-140px;right:-140px;width:520px;height:520px;border-radius:50%;
              background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 65%);
              animation:blob-dark 12s ease-in-out infinite;pointer-events:none;z-index:0;"></div>
  <div style="position:absolute;bottom:-120px;left:-120px;width:400px;height:400px;border-radius:50%;
              background:radial-gradient(circle,rgba(20,184,166,0.08) 0%,transparent 65%);
              animation:blob-dark 16s ease-in-out infinite 3s;pointer-events:none;z-index:0;"></div>
  <div style="position:absolute;top:40%;left:5%;width:250px;height:250px;border-radius:50%;
              background:radial-gradient(circle,rgba(99,102,241,0.07) 0%,transparent 65%);
              animation:blob-dark 21s ease-in-out infinite 6s;pointer-events:none;z-index:0;"></div>

  <div class="w-full max-w-sm relative anim-card" style="z-index:1;">

    <!-- Icon + title -->
    <div class="text-center mb-7">
      <div class="anim-icon inline-flex w-16 h-16 rounded-2xl mb-4 mx-auto items-center justify-center"
           style="background:linear-gradient(135deg,#059669,#0d9488);box-shadow:0 0 0 4px rgba(255,255,255,0.08),0 16px 40px rgba(5,150,105,0.3);">
        <i class="bi bi-shield-check text-white text-2xl"></i>
      </div>
      <div class="anim-head">
        <h1 class="text-2xl font-black text-white tracking-tight">Admin Console</h1>
        <p class="text-[10px] font-extrabold uppercase tracking-widest mt-1.5" style="color:#475569;">Secure administrator access</p>
      </div>
    </div>

    <!-- Dark card -->
    <div class="rounded-3xl p-7"
         style="background:rgba(30,41,59,0.80);backdrop-filter:blur(20px);
                border:1px solid rgba(255,255,255,0.08);
                box-shadow:0 24px 60px rgba(0,0,0,0.55),0 0 0 1px rgba(255,255,255,0.04) inset;">

      {% for msg in messages %}
      <div class="mb-5 flex items-start gap-3 text-xs font-bold px-4 py-3.5 rounded-2xl"
           style="background:rgba(225,29,72,0.12);border:1px solid rgba(225,29,72,0.25);color:#fda4af;">
        <i class="bi bi-exclamation-circle text-base flex-shrink-0 mt-0.5"></i>{{ msg }}
      </div>
      {% endfor %}

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div class="space-y-1.5 anim-f1">
          <label class="text-[10px] font-extrabold uppercase tracking-widest" style="color:#64748b;">Username</label>
          <div class="relative">
            <i class="bi bi-person absolute pointer-events-none text-slate-600 text-base"
               style="top:50%;transform:translateY(-50%);left:14px;"></i>
            <input name="username" type="text" required autocapitalize="none"
                   placeholder="Enter username"
                   class="dark-input w-full h-12 rounded-xl text-sm font-medium"
                   style="padding-left:42px;padding-right:16px;">
          </div>
        </div>

        <div class="space-y-1.5 anim-f2">
          <label class="text-[10px] font-extrabold uppercase tracking-widest" style="color:#64748b;">Password</label>
          <div class="relative">
            <i class="bi bi-lock absolute pointer-events-none text-slate-600 text-base"
               style="top:50%;transform:translateY(-50%);left:14px;"></i>
            <input name="password" type="password" required
                   placeholder="••••••••"
                   class="dark-input w-full h-12 rounded-xl text-sm font-medium"
                   style="padding-left:42px;padding-right:16px;">
          </div>
        </div>

        <button type="submit"
                class="anim-btn w-full h-12 rounded-xl font-bold text-sm text-white glass-btn-primary flex items-center justify-center gap-2 mt-1">
          <i class="bi bi-shield-lock text-base"></i>
          Sign In Securely
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
