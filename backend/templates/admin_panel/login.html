{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}

{% block extra_head %}
<style>
  @keyframes blob {
    0%,100% { transform:translate(0,0) scale(1); }
    33%      { transform:translate(28px,-36px) scale(1.07); }
    66%      { transform:translate(-20px,22px) scale(0.95); }
  }
  @keyframes card-up {
    from { opacity:0; transform:translateY(30px) scale(0.97); }
    to   { opacity:1; transform:translateY(0)    scale(1);    }
  }
  @keyframes fade-in-left {
    from { opacity:0; transform:translateX(-14px); }
    to   { opacity:1; transform:translateX(0);     }
  }
  .login-blob-1 { animation: blob 11s ease-in-out infinite; }
  .login-blob-2 { animation: blob 15s ease-in-out infinite 2.5s; }
  .login-blob-3 { animation: blob 20s ease-in-out infinite 5s; }
  .anim-card { animation: card-up       0.6s cubic-bezier(.22,1,.36,1) 0.05s both; }
  .anim-head { animation: fade-in-left  0.45s ease-out 0.2s  both; }
  .anim-f1   { animation: fade-in-left  0.45s ease-out 0.32s both; }
  .anim-f2   { animation: fade-in-left  0.45s ease-out 0.44s both; }
  .anim-btn  { animation: fade-in-left  0.45s ease-out 0.56s both; }
</style>
{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
     style="background:linear-gradient(145deg,#f0fdf4,#f8fafc 55%,#eff6ff);">

  <div class="login-blob-1 absolute pointer-events-none" style="top:-100px;right:-100px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(16,185,129,0.12) 0%,transparent 70%);"></div>
  <div class="login-blob-2 absolute pointer-events-none" style="bottom:-80px;left:-80px;width:360px;height:360px;border-radius:50%;background:radial-gradient(circle,rgba(20,184,166,0.09) 0%,transparent 70%);"></div>
  <div class="login-blob-3 absolute pointer-events-none" style="top:40%;left:5%;width:210px;height:210px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.06) 0%,transparent 70%);"></div>

  <div class="w-full max-w-sm relative anim-card" style="z-index:1;">

    <div class="anim-head text-center mb-7">
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">Admin Console</h1>
      <p class="text-[10px] font-extrabold uppercase tracking-widest mt-1.5 text-slate-400">Secure administrator access</p>
    </div>

    <div class="rounded-3xl p-7"
         style="background:rgba(255,255,255,0.90);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,0.75);box-shadow:0 24px 56px -8px rgba(15,23,42,0.10),0 0 0 1px rgba(255,255,255,0.65) inset;">

      {% for msg in messages %}
      <div class="mb-5 flex items-start gap-2.5 text-xs font-bold px-4 py-3.5 rounded-2xl"
           style="background:#fff1f2;border:1px solid #fecdd3;color:#be123c;">
        <i class="bi bi-exclamation-circle text-sm flex-shrink-0 mt-0.5"></i>{{ msg }}
      </div>
      {% endfor %}

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div class="space-y-1.5 anim-f1">
          <label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Username</label>
          <div class="relative">
            <i class="bi bi-person absolute pointer-events-none text-slate-400 text-base" style="top:50%;transform:translateY(-50%);left:14px;"></i>
            <input name="username" type="text" required autocapitalize="none"
                   placeholder="Enter username"
                   class="w-full h-12 rounded-xl glass-input text-slate-800 placeholder-slate-300 text-sm font-medium focus:outline-none"
                   style="padding-left:42px;padding-right:16px;">
          </div>
        </div>

        <div class="space-y-1.5 anim-f2">
          <label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Password</label>
          <div class="relative">
            <i class="bi bi-lock absolute pointer-events-none text-slate-400 text-base" style="top:50%;transform:translateY(-50%);left:14px;"></i>
            <input name="password" type="password" required
                   placeholder="••••••••"
                   class="w-full h-12 rounded-xl glass-input text-slate-800 placeholder-slate-300 text-sm font-medium focus:outline-none"
                   style="padding-left:42px;padding-right:16px;">
          </div>
        </div>

        <button type="submit"
                class="anim-btn w-full h-12 rounded-xl font-bold text-sm text-white glass-btn-primary flex items-center justify-center gap-2 mt-1">
          <i class="bi bi-shield-lock text-base"></i>
          Sign In Securely
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
