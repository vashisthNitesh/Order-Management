{% extends "admin_panel/base.html" %}
{% block page_title %}{% if offer %}Edit Offer{% else %}Add Offer{% endif %}{% endblock %}
{% block content %}
<div class="p-6 max-w-lg">
  <div class="flex items-center gap-3 mb-6">
    <a href="{% url 'web:admin_offers' %}" class="w-8 h-8 bg-gray-100 rounded-xl flex items-center justify-center hover:bg-gray-200 transition-colors text-gray-600">←</a>
    <h2 class="font-bold text-gray-900">{% if offer %}Edit Offer{% else %}Add New Offer{% endif %}</h2>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-6">
    <form method="post" class="space-y-5">
      {% csrf_token %}

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-gray-700">Title <span class="text-red-500">*</span></label>
        <input name="title" type="text" required value="{{ offer.title|default:'' }}" placeholder="e.g. Weekend Special 20% Off"
          class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
      </div>

      <div class="space-y-1.5">
        <label class="text-sm font-medium text-gray-700">Description</label>
        <textarea name="description" rows="2" placeholder="Optional offer details"
          class="w-full rounded-xl border border-gray-200 px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 resize-none">{{ offer.description|default:'' }}</textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-700">Discount Type</label>
          <select name="discount_type"
            class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 bg-white">
            <option value="percentage" {% if not offer or offer.discount_type == 'percentage' %}selected{% endif %}>Percentage (%)</option>
            <option value="flat" {% if offer and offer.discount_type == 'flat' %}selected{% endif %}>Flat Amount (₹)</option>
          </select>
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-700">Discount Value <span class="text-red-500">*</span></label>
          <input name="discount_value" type="number" step="0.01" min="0" required value="{{ offer.discount_value|default:'' }}" placeholder="0"
            class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-700">Min Order (₹)</label>
          <input name="min_order_amount" type="number" step="0.01" min="0" value="{{ offer.min_order_amount|default:'0' }}"
            class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-700">Promo Code</label>
          <input name="promo_code" type="text" value="{{ offer.promo_code|default:'' }}" placeholder="e.g. SAVE20"
            class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 font-mono uppercase">
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-700">Start Date <span class="text-red-500">*</span></label>
          <input name="start_date" type="date" required value="{{ offer.start_date|date:'Y-m-d'|default:'' }}"
            class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-700">End Date <span class="text-red-500">*</span></label>
          <input name="end_date" type="date" required value="{{ offer.end_date|date:'Y-m-d'|default:'' }}"
            class="w-full h-10 rounded-xl border border-gray-200 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400">
        </div>
      </div>

      <div class="flex items-center gap-3">
        <input name="is_active" type="checkbox" id="is_active" {% if not offer or offer.is_active %}checked{% endif %}
          class="w-4 h-4 rounded accent-emerald-600">
        <label for="is_active" class="text-sm font-medium text-gray-700">Active (visible to customers)</label>
      </div>

      <div class="flex gap-3 pt-2">
        <a href="{% url 'web:admin_offers' %}" class="flex-1 text-center py-2.5 border border-gray-200 text-gray-600 rounded-xl text-sm font-medium hover:bg-gray-50 transition-colors">Cancel</a>
        <button type="submit" class="flex-1 bg-gradient-to-r from-emerald-600 to-teal-500 text-white rounded-xl py-2.5 text-sm font-semibold hover:from-emerald-700 hover:to-teal-600 transition-all">
          {% if offer %}Save Changes{% else %}Add Offer{% endif %}
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
