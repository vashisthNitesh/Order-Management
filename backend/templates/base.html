<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Restaurant{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
                     400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
                     800:'#065f46',900:'#064e3b' }
          }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    
    /* Modern soft background dot pattern */
    .bg-dots {
      background-image: radial-gradient(rgba(16, 185, 129, 0.05) 1.5px, transparent 0);
      background-size: 24px 24px;
    }
    .bg-dots-dark {
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1.5px, transparent 0);
      background-size: 24px 24px;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 bg-dots text-gray-900 antialiased font-sans">

  {# Global Toast Container #}
  <div x-data="{
         toasts: [],
         addToast(title, message, type='success') {
           const id = Date.now();
           this.toasts.push({ id, title, message, type });
           setTimeout(() => {
             this.toasts = this.toasts.filter(t => t.id !== id);
           }, 6000);
         }
       }"
       @show-toast.window="addToast($event.detail.title, $event.detail.message, $event.detail.type)"
       class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 max-w-sm w-full pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-transition:enter="transition ease-out duration-300"
           x-transition:enter-start="-translate-y-4 opacity-0 scale-95"
           x-transition:enter-end="translate-y-0 opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-200"
           x-transition:leave-start="translate-y-0 opacity-100 scale-100"
           x-transition:leave-end="translate-x-12 opacity-0"
           class="bg-white/95 backdrop-blur-md border border-gray-150 shadow-2xl rounded-2xl p-4 flex gap-3 pointer-events-auto relative overflow-hidden transition-all duration-300">
        <!-- Colored side bar -->
        <div class="absolute left-0 top-0 bottom-0 w-1.5"
             :class="{
               'bg-emerald-500': toast.type === 'success',
               'bg-blue-500': toast.type === 'info',
               'bg-amber-500': toast.type === 'warning',
               'bg-red-500': toast.type === 'error'
             }"></div>
        <!-- Icon -->
        <div class="text-xl flex-shrink-0" x-text="toast.type === 'success' ? '🔔' : toast.type === 'info' ? 'ℹ️' : toast.type === 'warning' ? '⚠️' : '🚨'"></div>
        <div class="pl-1.5 pr-4">
          <h4 class="font-bold text-gray-900 text-xs" x-text="toast.title"></h4>
          <p class="text-[11px] text-gray-500 mt-0.5 leading-relaxed" x-text="toast.message"></p>
        </div>
        <!-- Close button -->
        <button @click="toasts = toasts.filter(t => t.id !== toast.id)" class="absolute top-2 right-2 text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </template>
  </div>

  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}

  {% if request.user.is_authenticated %}
  <script>
    (function() {
      let lastSeenId = parseInt(sessionStorage.getItem('staff_last_seen_notification_id') || '0');
      const restaurantId = 1;

      const pollNotifications = async () => {
        try {
          const res = await fetch(`/api/orders/notifications/poll/?restaurant_id=${restaurantId}&last_seen_id=${lastSeenId}`);
          if (res.status === 200) {
            const data = await res.json();
            const notifications = data.notifications || [];
            
            if (notifications.length > 0) {
              const maxId = Math.max(...notifications.map(n => n.id));
              
              if (lastSeenId > 0) {
                notifications.forEach(n => {
                  try {
                    new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-600.wav').play();
                  } catch(e) {}
                  
                  window.dispatchEvent(new CustomEvent('show-toast', {
                    detail: {
                      title: n.title,
                      message: n.message,
                      type: 'success'
                    }
                  }));
                });
              }
              
              lastSeenId = maxId;
              sessionStorage.setItem('staff_last_seen_notification_id', lastSeenId);
              
              // Soft reload dashboards and order screens after a short delay so they see the new order
              const path = window.location.pathname;
              if (path.includes('/manage/') || path.includes('/staff/')) {
                setTimeout(() => {
                  window.location.reload();
                }, 2000);
              }
            }
          }
        } catch(e) {}
      };

      // Set the watermark ID on the first load of the session to avoid historic notification storms
      if (lastSeenId === 0) {
        pollNotifications().then(() => {
          setInterval(pollNotifications, 5000);
        });
      } else {
        setInterval(pollNotifications, 5000);
        pollNotifications();
      }
    })();
  </script>
  {% endif %}
</body>
</html>
