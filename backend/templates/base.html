<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Restaurant{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
                     400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
                     800:'#065f46',900:'#064e3b' }
          }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    
    /* Modern soft background dot pattern */
    .bg-dots {
      background-image: radial-gradient(rgba(16, 185, 129, 0.05) 1.5px, transparent 0);
      background-size: 24px 24px;
    }
    .bg-dots-dark {
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1.5px, transparent 0);
      background-size: 24px 24px;
    }

    /* Clean modern thin scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 bg-dots text-gray-900 antialiased font-sans">

  {# Global Toast Container #}
  <div x-data="{
         toasts: [],
         addToast(title, message, type='success', order_id=null) {
           const id = Date.now();
           this.toasts.push({ id, title, message, type, order_id });
           setTimeout(() => {
             this.toasts = this.toasts.filter(t => t.id !== id);
           }, 6000);
         }
       }"
       @show-toast.window="addToast($event.detail.title, $event.detail.message, $event.detail.type, $event.detail.order_id)"
       class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-3 w-[calc(100vw-32px)] sm:w-96 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-transition:enter="transition ease-out duration-400 transform"
           x-transition:enter-start="translate-y-[-30px] opacity-0 scale-95"
           x-transition:enter-end="translate-y-0 opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-200 transform"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="translate-y-[-10px] opacity-0 scale-95"
           @click="if (toast.order_id && window.location.pathname.includes('/manage/')) window.location.href = `/manage/orders/${toast.order_id}/`"
           :class="toast.order_id && window.location.pathname.includes('/manage/') ? 'cursor-pointer hover:border-slate-350 hover:shadow-[0_25px_50px_rgba(0,0,0,0.12)]' : ''"
           class="bg-white/95 backdrop-blur-xl border border-gray-200/50 shadow-[0_20px_45px_rgba(0,0,0,0.1)] rounded-2xl p-4 flex gap-3.5 pointer-events-auto relative overflow-hidden transition-all duration-300 w-full">
        <!-- Colored side gradient bar -->
        <div class="absolute left-0 top-0 bottom-0 w-1"
             :class="{
               'bg-gradient-to-b from-emerald-500 to-teal-400': toast.type === 'success',
               'bg-gradient-to-b from-blue-500 to-indigo-400': toast.type === 'info',
               'bg-gradient-to-b from-amber-500 to-orange-400': toast.type === 'warning',
               'bg-gradient-to-b from-red-500 to-pink-400': toast.type === 'error'
             }"></div>
        <!-- Modern Status Icon with Glow -->
        <div class="flex-shrink-0 w-9 h-9 rounded-xl flex items-center justify-center relative overflow-hidden"
             :class="{
               'bg-emerald-50 text-emerald-600 border border-emerald-100': toast.type === 'success',
               'bg-blue-50 text-blue-600 border border-blue-100': toast.type === 'info',
               'bg-amber-50 text-amber-600 border border-amber-100': toast.type === 'warning',
               'bg-red-50 text-red-600 border border-red-100': toast.type === 'error'
             }">
          <template x-if="toast.type === 'success'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
          <template x-if="toast.type === 'info'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
          <template x-if="toast.type === 'warning'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          </template>
          <template x-if="toast.type === 'error'">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
        </div>
        <!-- Content -->
        <div class="flex-1 min-w-0 pr-4">
          <h4 class="font-bold text-gray-900 text-xs tracking-tight" x-text="toast.title"></h4>
          <p class="text-[11px] text-gray-500 mt-0.5 leading-relaxed font-semibold" x-text="toast.message"></p>
        </div>
        <!-- Close button -->
        <button @click.stop="toasts = toasts.filter(t => t.id !== toast.id)" class="absolute top-3 right-3 text-gray-400 hover:text-gray-650 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </template>
  </div>

  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}

  <script>
    // Premium Synthesized Chime using Web Audio API
    // This solves browser autoplay block and eliminates external link issues.
    let audioUnlocked = false;
    let audioContext = null;
    
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
        audioUnlocked = true;
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
      } catch(e) {}
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);
    
    function playNotificationSound() {
      try {
        const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        
        const now = ctx.currentTime;
        
        // Tone 1: A5 (880Hz) - Sine wave (pure chime)
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(880.00, now);
        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.35, now + 0.02);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.6);

        // Tone 2: C#6 (1108.73Hz) - Sine wave, slightly delayed for cascade effect
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(1108.73, now + 0.08);
        gain2.gain.setValueAtTime(0, now + 0.08);
        gain2.gain.linearRampToValueAtTime(0.35, now + 0.10);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.08);
        osc2.stop(now + 0.7);

        // Tone 3: E6 (1318.51Hz) - High bell tone, slightly more delayed
        const osc3 = ctx.createOscillator();
        const gain3 = ctx.createGain();
        osc3.type = 'sine';
        osc3.frequency.setValueAtTime(1318.51, now + 0.16);
        gain3.gain.setValueAtTime(0, now + 0.16);
        gain3.gain.linearRampToValueAtTime(0.25, now + 0.18);
        gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
        osc3.connect(gain3);
        gain3.connect(ctx.destination);
        osc3.start(now + 0.16);
        osc3.stop(now + 0.8);
      } catch(e) {
        console.log('Audio synthesis error:', e);
      }
    }
  </script>

  {% if request.user.is_authenticated %}
  <script>
    (function() {
      let lastSeenId = parseInt(sessionStorage.getItem('staff_last_seen_notification_id') || '0');
      const restaurantId = 1;

      const pollNotifications = async () => {
        try {
          const res = await fetch(`/api/orders/notifications/poll/?restaurant_id=${restaurantId}&last_seen_id=${lastSeenId}`);
          if (res.status === 200) {
            const data = await res.json();
            const notifications = data.notifications || [];
            
            if (notifications.length > 0) {
              const maxId = Math.max(...notifications.map(n => n.id));
              
              if (lastSeenId > 0) {
                notifications.forEach(n => {
                  playNotificationSound();
                  
                  window.dispatchEvent(new CustomEvent('show-toast', {
                    detail: {
                      title: n.title,
                      message: n.message,
                      order_id: n.order_id,
                      type: 'success'
                    }
                  }));
                });
              }
              
              lastSeenId = maxId;
              sessionStorage.setItem('staff_last_seen_notification_id', lastSeenId);
              
              // Soft reload dashboards and order screens after a short delay so they see the new order
              const path = window.location.pathname;
              if (path.includes('/manage/') || path.includes('/staff/')) {
                setTimeout(() => {
                  window.location.reload();
                }, 2000);
              }
            }
          }
        } catch(e) {}
      };

      // Set the watermark ID on the first load of the session to avoid historic notification storms
      if (lastSeenId === 0) {
        pollNotifications().then(() => {
          setInterval(pollNotifications, 5000);
        });
      } else {
        setInterval(pollNotifications, 5000);
        pollNotifications();
      }
    })();
  </script>
  {% endif %}
</body>
</html>
