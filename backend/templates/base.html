<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Restaurant{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
                     400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
                     800:'#065f46',900:'#064e3b' }
          }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    
    /* Clean light background dot pattern */
    .bg-dots {
      background-image: radial-gradient(rgba(16, 185, 129, 0.05) 1.5px, transparent 0);
      background-size: 24px 24px;
    }

    /* Clean modern thin scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 9999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Clean solid SaaS panels and cards */
    .glass-panel {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.03), 0 2px 4px -2px rgb(0 0 0 / 0.03);
    }
    
    .glass-card {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05), 0 1px 2px -1px rgb(0 0 0 / 0.05);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.08);
      border-color: #cbd5e1;
    }

    .glass-card-static {
      background: #ffffff;
      border: 1px solid #e2e8f0;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.02);
    }

    .glass-input {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      transition: all 0.2s ease-in-out;
    }
    .glass-input:focus {
      background: #ffffff;
      border-color: #10b981;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.12);
    }

    .glass-btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      box-shadow: 0 2px 8px rgba(16, 185, 129, 0.15);
      transition: all 0.2s ease-in-out;
    }
    .glass-btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      background: linear-gradient(135deg, #059669, #047857);
    }
    .glass-btn-primary:active {
      transform: translateY(0);
    }

    .glass-btn-secondary {
      background: #ffffff;
      border: 1px solid #cbd5e1;
      color: #334155;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.02);
    }
    .glass-btn-secondary:hover {
      background: #f8fafc;
      border-color: #94a3b8;
      color: #0f172a;
    }

    .glass-btn-success {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #047857;
      transition: all 0.2s ease-in-out;
    }
    .glass-btn-success:hover {
      background: rgba(16, 185, 129, 0.15);
    }

    .glass-btn-danger {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #b91c1c;
      transition: all 0.2s ease-in-out;
    }
    .glass-btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-slate-50 bg-dots text-slate-800 antialiased font-sans">

  {# Global Toast Container #}
  <div x-data="{
         toasts: [],
         addToast(title, message, type='success', order_id=null) {
           const id = Date.now();
           this.toasts.push({ id, title, message, type, order_id });
           setTimeout(() => {
             this.toasts = this.toasts.filter(t => t.id !== id);
           }, 6000);
         }
       }"
       @show-toast.window="addToast($event.detail.title, $event.detail.message, $event.detail.type, $event.detail.order_id)"
       class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-3 w-[calc(100vw-32px)] sm:w-96 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-transition:enter="transition ease-out duration-300 transform"
           x-transition:enter-start="translate-y-[-20px] opacity-0 scale-95"
           x-transition:enter-end="translate-y-0 opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-200 transform"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="translate-y-[-10px] opacity-0 scale-95"
           @click="if (toast.order_id && window.location.pathname.includes('/manage/')) window.location.href = `/manage/orders/${toast.order_id}/`"
           :class="toast.order_id && window.location.pathname.includes('/manage/') ? 'cursor-pointer hover:border-slate-300 hover:shadow-xl' : ''"
           class="bg-white border border-slate-200/80 shadow-2xl rounded-2xl p-4 flex gap-4 pointer-events-auto relative overflow-hidden transition-all duration-200 w-full">
        <!-- Left vertical accent indicator line -->
        <div class="absolute left-0 top-0 bottom-0 w-1"
             :class="{
               'bg-emerald-500': toast.type === 'success',
               'bg-blue-500': toast.type === 'info',
               'bg-amber-500': toast.type === 'warning',
               'bg-red-500': toast.type === 'error'
             }"></div>
        <!-- Status Icon -->
        <div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center relative border"
             :class="{
               'bg-emerald-50 text-emerald-600 border-emerald-100': toast.type === 'success',
               'bg-blue-50 text-blue-600 border-blue-100': toast.type === 'info',
               'bg-amber-50 text-amber-600 border-amber-100': toast.type === 'warning',
               'bg-red-50 text-red-700 border-red-100': toast.type === 'error'
             }">
          <template x-if="toast.type === 'success'">
            <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
          <template x-if="toast.type === 'info'">
            <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
          <template x-if="toast.type === 'warning'">
            <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          </template>
          <template x-if="toast.type === 'error'">
            <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
        </div>
        <!-- Content -->
        <div class="flex-1 min-w-0 pr-4">
          <h4 class="font-extrabold text-slate-900 text-sm tracking-tight" x-text="toast.title"></h4>
          <p class="text-xs text-slate-500 mt-1 leading-relaxed font-semibold" x-text="toast.message"></p>
        </div>
        <!-- Close button -->
        <button @click.stop="toasts = toasts.filter(t => t.id !== toast.id)" class="absolute top-3 right-3 text-slate-400 hover:text-slate-600 transition-colors w-6 h-6 rounded-lg flex items-center justify-center hover:bg-slate-50">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </template>
  </div>

  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}

  <script>
    // Premium Synthesized Chime using Web Audio API
    // Slightly louder and cleaner chord for premium feel
    let audioUnlocked = false;
    let audioContext = null;
    
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
        audioUnlocked = true;
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
      } catch(e) {}
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);
    
    function playNotificationSound() {
      try {
        const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        
        const now = ctx.currentTime;
        
        // Tone 1: A5 (880Hz) - Chime
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(880.00, now);
        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.5, now + 0.02);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.6);

        // Tone 2: C#6 (1108.73Hz) - Slightly delayed
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(1108.73, now + 0.06);
        gain2.gain.setValueAtTime(0, now + 0.06);
        gain2.gain.linearRampToValueAtTime(0.5, now + 0.08);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.06);
        osc2.stop(now + 0.7);

        // Tone 3: E6 (1318.51Hz) - High chime, delayed
        const osc3 = ctx.createOscillator();
        const gain3 = ctx.createGain();
        osc3.type = 'sine';
        osc3.frequency.setValueAtTime(1318.51, now + 0.12);
        gain3.gain.setValueAtTime(0, now + 0.12);
        gain3.gain.linearRampToValueAtTime(0.4, now + 0.14);
        gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
        osc3.connect(gain3);
        gain3.connect(ctx.destination);
        osc3.start(now + 0.12);
        osc3.stop(now + 0.8);
      } catch(e) {
        console.log('Audio synthesis error:', e);
      }
    }
  </script>

  {% if request.user.is_authenticated %}
  <script>
    (function() {
      // Robust notification polling for staff: baseline established silently on load
      let lastSeenId = parseInt(sessionStorage.getItem('staff_last_seen_notification_id') || '0');
      let isInitialized = lastSeenId > 0;
      const restaurantId = 1;

      const pollNotifications = async () => {
        try {
          const res = await fetch(`/api/orders/notifications/poll/?restaurant_id=${restaurantId}&last_seen_id=${lastSeenId}`);
          if (res.status === 200) {
            const data = await res.json();
            const notifications = data.notifications || [];
            
            if (notifications.length > 0) {
              const maxId = Math.max(...notifications.map(n => n.id));
              
              if (isInitialized) {
                notifications.forEach(n => {
                  playNotificationSound();
                  
                  window.dispatchEvent(new CustomEvent('show-toast', {
                    detail: {
                      title: n.title,
                      message: n.message,
                      order_id: n.order_id,
                      type: 'success'
                    }
                  }));
                });
                
                // Soft reload dashboards and order screens after a short delay so they see the new order
                const path = window.location.pathname;
                if (path.includes('/manage/') || path.includes('/staff/')) {
                  setTimeout(() => {
                    window.location.reload();
                  }, 2000);
                }
              }
              
              lastSeenId = maxId;
              sessionStorage.setItem('staff_last_seen_notification_id', lastSeenId);
            } else if (!isInitialized) {
              // If server has 0 notifications on first load, establish baseline at 0
              lastSeenId = 0;
              sessionStorage.setItem('staff_last_seen_notification_id', 0);
            }
            isInitialized = true;
          }
        } catch(e) {}
      };

      // Always poll once immediately to establish the watermark silently, then start interval
      pollNotifications().then(() => {
        setInterval(pollNotifications, 5000);
      });
    })();
  </script>
  {% endif %}
</body>
</html>
