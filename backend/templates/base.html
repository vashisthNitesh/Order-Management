<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Restaurant{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
                     400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
                     800:'#065f46',900:'#064e3b' }
          }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    
    /* Modern soft background dot pattern */
    .bg-dots {
      background-image: radial-gradient(rgba(16, 185, 129, 0.05) 1.5px, transparent 0);
      background-size: 24px 24px;
    }
    .bg-dots-dark {
      background-image: radial-gradient(rgba(255, 255, 255, 0.04) 1.5px, transparent 0);
      background-size: 24px 24px;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-gray-50 bg-dots text-gray-900 antialiased font-sans">

  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}
</body>
</html>
