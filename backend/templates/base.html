<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Smart Restaurant{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'sans-serif'],
          },
          colors: {
            brand: { 50:'#ecfdf5',100:'#d1fae5',200:'#a7f3d0',300:'#6ee7b7',
                     400:'#34d399',500:'#10b981',600:'#059669',700:'#047857',
                     800:'#065f46',900:'#064e3b' }
          }
        }
      }
    }
  </script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak]{display:none!important}
    .scrollbar-hide::-webkit-scrollbar{display:none}
    .scrollbar-hide{-ms-overflow-style:none;scrollbar-width:none}
    .line-clamp-2{overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
    
    /* Clean light background dot pattern */
    .bg-dots {
      background-image: radial-gradient(rgba(16, 185, 129, 0.03) 1.5px, transparent 0);
      background-size: 24px 24px;
    }

    /* Clean modern thin scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.4);
      border-radius: 9999px;
      border: 1px solid transparent;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.7);
    }

    /* iCloud-Sonoma Thick Glass Styling */
    .glass-panel {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(24px) saturate(140%);
      -webkit-backdrop-filter: blur(24px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.8),
        0 4px 20px -2px rgba(15, 23, 42, 0.02),
        0 2px 8px -1px rgba(15, 23, 42, 0.01);
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px) saturate(130%);
      -webkit-backdrop-filter: blur(20px) saturate(130%);
      border: 1px solid rgba(255, 255, 255, 0.55);
      box-shadow: 
        inset 0 1px 1.5px 0 rgba(255, 255, 255, 0.7),
        0 1px 3px 0 rgba(15, 23, 42, 0.01),
        0 1px 2px -1px rgba(15, 23, 42, 0.01);
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-card:hover {
      transform: translateY(-2px) scale(1.005);
      box-shadow: 
        inset 0 1px 2px 0 rgba(255, 255, 255, 0.95),
        0 16px 28px -4px rgba(15, 23, 42, 0.05),
        0 6px 16px -2px rgba(15, 23, 42, 0.03);
      border-color: rgba(255, 255, 255, 0.85);
      background: rgba(255, 255, 255, 0.65);
    }

    .glass-card-static {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: 
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.7),
        0 1px 2px 0 rgba(15, 23, 42, 0.01);
    }

    .glass-input {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(203, 213, 225, 0.6);
      box-shadow: inset 0 1px 1px 0 rgba(15, 23, 42, 0.01);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.9);
      border-color: #10b981;
      transform: scale(1.005);
      box-shadow: 
        0 0 0 4px rgba(16, 185, 129, 0.12),
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.9);
    }

    .glass-btn-primary {
      background: linear-gradient(135deg, #10b981, #059669);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      box-shadow: 0 2px 10px rgba(16, 185, 129, 0.15);
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }
    .glass-btn-primary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transform: skewX(-20deg);
      transition: all 0.75s ease;
    }
    .glass-btn-primary:hover::after {
      left: 150%;
    }
    .glass-btn-primary:hover {
      transform: translateY(-1.5px);
      box-shadow: 0 6px 16px rgba(16, 185, 129, 0.25);
      background: linear-gradient(135deg, #059669, #047857);
    }
    .glass-btn-primary:active {
      transform: translateY(0.5px) scale(0.98);
    }

    .glass-btn-secondary {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(203, 213, 225, 0.6);
      color: #334155;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 
        inset 0 1px 1px 0 rgba(255, 255, 255, 0.7),
        0 1px 2px 0 rgba(0, 0, 0, 0.02);
      position: relative;
      overflow: hidden;
    }
    .glass-btn-secondary::after {
      content: '';
      position: absolute;
      top: 0;
      left: -150%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
      transform: skewX(-20deg);
      transition: all 0.75s ease;
    }
    .glass-btn-secondary:hover::after {
      left: 150%;
    }
    .glass-btn-secondary:hover {
      background: rgba(255, 255, 255, 0.85);
      border-color: #cbd5e1;
      color: #0f172a;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(15, 23, 42, 0.04);
    }
    .glass-btn-secondary:active {
      transform: translateY(0) scale(0.98);
    }

    .glass-btn-success {
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #047857;
      transition: all 0.2s ease-in-out;
    }
    .glass-btn-success:hover {
      background: rgba(16, 185, 129, 0.15);
      transform: translateY(-1px);
    }
    .glass-btn-success:active {
      transform: translateY(0);
    }

    .glass-btn-danger {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #b91c1c;
      transition: all 0.2s ease-in-out;
    }
    .glass-btn-danger:hover {
      background: rgba(239, 68, 68, 0.15);
      transform: translateY(-1px);
    }
    .glass-btn-danger:active {
      transform: translateY(0);
    }

    /* Page Entrance Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .animate-fade-up {
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* Sibling staggered animations */
    .stagger-item {
      opacity: 0;
      transform: translateY(14px);
      animation: fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      animation-delay: calc(var(--sibling-index, 1) * 0.06s);
    }

    /* Custom keyframes for active notifications bell */
    @keyframes bellRing {
      0%, 100% { transform: rotate(0); }
      15% { transform: rotate(10deg); }
      30% { transform: rotate(-10deg); }
      45% { transform: rotate(6deg); }
      60% { transform: rotate(-6deg); }
      75% { transform: rotate(3deg); }
      90% { transform: rotate(-3deg); }
    }
    .animate-bell-ring {
      animation: bellRing 0.8s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    /* Mesh backgrounds floating animations */
    @keyframes meshMove {
      0% { transform: translate(0, 0) scale(1) rotate(0deg); }
      33% { transform: translate(5%, 7%) scale(1.1) rotate(120deg); }
      66% { transform: translate(-4%, -5%) scale(0.92) rotate(240deg); }
      100% { transform: translate(0, 0) scale(1) rotate(360deg); }
    }
    .animate-mesh-1 {
      animation: meshMove 28s ease-in-out infinite alternate;
    }
    .animate-mesh-2 {
      animation: meshMove 32s ease-in-out infinite alternate-reverse;
    }
    .animate-mesh-3 {
      animation: meshMove 38s ease-in-out infinite alternate;
    }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-slate-50/70 bg-dots text-slate-800 antialiased font-sans relative min-h-screen">

  <!-- Ambient light blobs in background (Mesh Gradient layer) -->
  <div class="fixed inset-0 -z-20 overflow-hidden pointer-events-none">
    <div class="absolute -top-[15%] -left-[15%] w-[55rem] h-[55rem] rounded-full bg-emerald-400/[0.04] blur-[130px] animate-mesh-1"></div>
    <div class="absolute top-[20%] right-[-15%] w-[45rem] h-[45rem] rounded-full bg-teal-400/[0.03] blur-[120px] animate-mesh-2"></div>
    <div class="absolute bottom-[-15%] left-[10%] w-[60rem] h-[60rem] rounded-full bg-indigo-400/[0.03] blur-[140px] animate-mesh-3"></div>
  </div>

  {# Global Toast Container #}
  <div x-data="{
         toasts: [],
         addToast(title, message, type='success', order_id=null) {
           const id = Date.now();
           this.toasts.push({ id, title, message, type, order_id });
           setTimeout(() => {
             this.toasts = this.toasts.filter(t => t.id !== id);
           }, 6000);
         }
       }"
       @show-toast.window="addToast($event.detail.title, $event.detail.message, $event.detail.type, $event.detail.order_id)"
       class="fixed top-6 left-1/2 -translate-x-1/2 z-[9999] flex flex-col gap-3 w-[calc(100vw-32px)] sm:w-96 pointer-events-none">
    <template x-for="toast in toasts" :key="toast.id">
      <div x-transition:enter="transition ease-out duration-300 transform"
           x-transition:enter-start="translate-y-[-20px] opacity-0 scale-95"
           x-transition:enter-end="translate-y-0 opacity-100 scale-100"
           x-transition:leave="transition ease-in duration-200 transform"
           x-transition:leave-start="opacity-100 scale-100"
           x-transition:leave-end="translate-y-[-10px] opacity-0 scale-95"
           @click="if (toast.order_id && window.location.pathname.includes('/manage/')) window.location.href = `/manage/orders/${toast.order_id}/`"
           :class="toast.order_id && window.location.pathname.includes('/manage/') ? 'cursor-pointer hover:border-slate-300 hover:shadow-xl' : ''"
           class="bg-white border border-slate-200/80 shadow-2xl rounded-2xl p-4 flex gap-4 pointer-events-auto relative overflow-hidden transition-all duration-200 w-full">
        <!-- Left vertical accent indicator line -->
        <div class="absolute left-0 top-0 bottom-0 w-1"
             :class="{
               'bg-emerald-500': toast.type === 'success',
               'bg-blue-500': toast.type === 'info',
               'bg-amber-500': toast.type === 'warning',
               'bg-red-500': toast.type === 'error'
             }"></div>
        <!-- Status Icon -->
        <div class="flex-shrink-0 w-10 h-10 rounded-xl flex items-center justify-center relative border"
             :class="{
               'bg-emerald-50 text-emerald-600 border-emerald-100': toast.type === 'success',
               'bg-blue-50 text-blue-600 border-blue-100': toast.type === 'info',
               'bg-amber-50 text-amber-600 border-amber-100': toast.type === 'warning',
               'bg-red-50 text-red-700 border-red-100': toast.type === 'error'
             }">
          <template x-if="toast.type === 'success'">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
          <template x-if="toast.type === 'info'">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
          <template x-if="toast.type === 'warning'">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
            </svg>
          </template>
          <template x-if="toast.type === 'error'">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </template>
        </div>
        <!-- Content -->
        <div class="flex-1 min-w-0 pr-4">
          <h4 class="font-extrabold text-slate-900 text-sm tracking-tight" x-text="toast.title"></h4>
          <p class="text-xs text-slate-500 mt-1 leading-relaxed font-semibold" x-text="toast.message"></p>
        </div>
        <!-- Close button -->
        <button @click.stop="toasts = toasts.filter(t => t.id !== toast.id)" class="absolute top-3 right-3 text-slate-400 hover:text-slate-600 transition-colors w-6 h-6 rounded-lg flex items-center justify-center hover:bg-slate-50">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </template>
  </div>

  {% block body %}{% endblock %}
  {% block extra_scripts %}{% endblock %}

  <script>
    // Premium Synthesized Chime using Web Audio API
    // Slightly louder and cleaner chord for premium feel
    let audioUnlocked = false;
    let audioContext = null;
    
    function unlockAudio() {
      if (audioUnlocked) return;
      try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
        audioUnlocked = true;
        document.removeEventListener('click', unlockAudio);
        document.removeEventListener('touchstart', unlockAudio);
      } catch(e) {}
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchstart', unlockAudio);
    
    function playNotificationSound() {
      try {
        const ctx = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') {
          ctx.resume();
        }
        
        const now = ctx.currentTime;
        
        // Tone 1: A5 (880Hz) - Chime
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.type = 'sine';
        osc1.frequency.setValueAtTime(880.00, now);
        gain1.gain.setValueAtTime(0, now);
        gain1.gain.linearRampToValueAtTime(0.5, now + 0.02);
        gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.6);

        // Tone 2: C#6 (1108.73Hz) - Slightly delayed
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.setValueAtTime(1108.73, now + 0.06);
        gain2.gain.setValueAtTime(0, now + 0.06);
        gain2.gain.linearRampToValueAtTime(0.5, now + 0.08);
        gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.06);
        osc2.stop(now + 0.7);

        // Tone 3: E6 (1318.51Hz) - High chime, delayed
        const osc3 = ctx.createOscillator();
        const gain3 = ctx.createGain();
        osc3.type = 'sine';
        osc3.frequency.setValueAtTime(1318.51, now + 0.12);
        gain3.gain.setValueAtTime(0, now + 0.12);
        gain3.gain.linearRampToValueAtTime(0.4, now + 0.14);
        gain3.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
        osc3.connect(gain3);
        gain3.connect(ctx.destination);
        osc3.start(now + 0.12);
        osc3.stop(now + 0.8);
      } catch(e) {
        console.log('Audio synthesis error:', e);
      }
    }
  </script>

  {% if request.user.is_authenticated %}
  <script>
    (function() {
      // Robust notification polling for staff: baseline established silently on load
      let lastSeenId = parseInt(sessionStorage.getItem('staff_last_seen_notification_id') || '0');
      let isInitialized = lastSeenId > 0;
      const restaurantId = 1;

      const pollNotifications = async () => {
        try {
          const res = await fetch(`/api/orders/notifications/poll/?restaurant_id=${restaurantId}&last_seen_id=${lastSeenId}`);
          if (res.status === 200) {
            const data = await res.json();
            const notifications = data.notifications || [];
            
            if (notifications.length > 0) {
              const maxId = Math.max(...notifications.map(n => n.id));
              
              if (isInitialized) {
                notifications.forEach(n => {
                  playNotificationSound();
                  
                  window.dispatchEvent(new CustomEvent('show-toast', {
                    detail: {
                      title: n.title,
                      message: n.message,
                      order_id: n.order_id,
                      type: 'success'
                    }
                  }));
                });
                
                // Soft reload dashboards and order screens after a short delay so they see the new order
                const path = window.location.pathname;
                if (path.includes('/manage/') || path.includes('/staff/')) {
                  setTimeout(() => {
                    window.location.reload();
                  }, 2000);
                }
              }
              
              lastSeenId = maxId;
              sessionStorage.setItem('staff_last_seen_notification_id', lastSeenId);
            } else if (!isInitialized) {
              // If server has 0 notifications on first load, establish baseline at 0
              lastSeenId = 0;
              sessionStorage.setItem('staff_last_seen_notification_id', 0);
            }
            isInitialized = true;
          }
        } catch(e) {}
      };

      // Always poll once immediately to establish the watermark silently, then start interval
      pollNotifications().then(() => {
        setInterval(pollNotifications, 5000);
      });
    })();
  </script>
  {% endif %}
</body>
</html>
