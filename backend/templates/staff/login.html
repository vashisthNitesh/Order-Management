{% extends "base.html" %}
{% block title %}Staff Login{% endblock %}
{% block body %}
<div class="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-emerald-500 to-teal-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
        <span class="text-3xl">🍽️</span>
      </div>
      <h1 class="text-2xl font-bold text-white mb-1">Staff Portal</h1>
      <p class="text-gray-400 text-sm">Sign in to manage orders</p>
    </div>
    <div class="bg-white/5 backdrop-blur-xl rounded-3xl p-6 border border-white/10">
      {% for msg in messages %}
      <div class="mb-4 bg-red-500/20 border border-red-500/30 text-red-300 text-sm px-4 py-3 rounded-xl">{{ msg }}</div>
      {% endfor %}
      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-300">Username</label>
          <input name="username" type="text" required autocomplete="username" autocapitalize="none"
            class="w-full h-10 rounded-xl bg-white/10 border border-white/10 text-white placeholder-gray-500 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div class="space-y-1.5">
          <label class="text-sm font-medium text-gray-300">Password</label>
          <input name="password" type="password" required autocomplete="current-password"
            class="w-full h-10 rounded-xl bg-white/10 border border-white/10 text-white placeholder-gray-500 px-3 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <button type="submit"
          class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 text-white rounded-xl h-11 font-semibold hover:from-emerald-700 hover:to-teal-600 transition-all mt-2">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
