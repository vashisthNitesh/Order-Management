{% extends "base.html" %}
{% block title %}Staff Login{% endblock %}

{% block extra_head %}
<style>
  @keyframes blob {
    0%,100% { transform: translate(0,0) scale(1); }
    33%      { transform: translate(26px,-34px) scale(1.07); }
    66%      { transform: translate(-20px,20px) scale(0.95); }
  }
  @keyframes card-up {
    from { opacity:0; transform:translateY(32px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }
  @keyframes icon-pop {
    from { opacity:0; transform:scale(0.4) rotate(-15deg); }
    to   { opacity:1; transform:scale(1) rotate(0deg); }
  }
  @keyframes slide-in {
    from { opacity:0; transform:translateX(-16px); }
    to   { opacity:1; transform:translateX(0); }
  }
  .anim-card { animation: card-up  0.6s cubic-bezier(.22,1,.36,1) 0.05s both; }
  .anim-icon { animation: icon-pop 0.5s cubic-bezier(.22,1,.36,1) 0.15s both; }
  .anim-head { animation: slide-in 0.45s ease-out 0.25s both; }
  .anim-f1   { animation: slide-in 0.45s ease-out 0.35s both; }
  .anim-f2   { animation: slide-in 0.45s ease-out 0.45s both; }
  .anim-btn  { animation: slide-in 0.45s ease-out 0.55s both; }
</style>
{% endblock %}

{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden"
     style="background: linear-gradient(145deg, #f0fdf4, #f8fafc 55%, #eff6ff);">

  <!-- Decorative blobs (supplement the base.html mesh) -->
  <div style="position:absolute;top:-100px;right:-100px;width:420px;height:420px;border-radius:50%;
              background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 70%);
              animation:blob 11s ease-in-out infinite;pointer-events:none;z-index:0;"></div>
  <div style="position:absolute;bottom:-80px;left:-80px;width:340px;height:340px;border-radius:50%;
              background:radial-gradient(circle,rgba(20,184,166,0.08) 0%,transparent 70%);
              animation:blob 15s ease-in-out infinite 2.5s;pointer-events:none;z-index:0;"></div>
  <div style="position:absolute;top:42%;left:6%;width:200px;height:200px;border-radius:50%;
              background:radial-gradient(circle,rgba(16,185,129,0.06) 0%,transparent 70%);
              animation:blob 20s ease-in-out infinite 5.5s;pointer-events:none;z-index:0;"></div>

  <div class="w-full max-w-sm relative anim-card" style="z-index:1;">

    <!-- Icon + title -->
    <div class="text-center mb-7">
      <div class="anim-icon inline-flex w-16 h-16 rounded-2xl mb-4 mx-auto items-center justify-center shadow-xl ring-4 ring-white/70"
           style="background: linear-gradient(135deg, #059669, #0d9488);">
        <i class="bi bi-bag-check text-white text-2xl"></i>
      </div>
      <div class="anim-head">
        <h1 class="text-2xl font-black text-slate-900 tracking-tight">Staff Portal</h1>
        <p class="text-[10px] font-extrabold uppercase tracking-widest mt-1.5 text-slate-400">Sign in to manage orders</p>
      </div>
    </div>

    <!-- Card -->
    <div class="rounded-3xl p-7"
         style="background:rgba(255,255,255,0.88);backdrop-filter:blur(16px);
                border:1px solid rgba(255,255,255,0.75);
                box-shadow:0 24px 56px -8px rgba(15,23,42,0.1),0 0 0 1px rgba(255,255,255,0.65) inset;">

      {% for msg in messages %}
      <div class="mb-5 flex items-start gap-3 text-xs font-bold px-4 py-3.5 rounded-2xl"
           style="background:#fff1f2;border:1px solid #fecdd3;color:#be123c;">
        <i class="bi bi-exclamation-circle text-base flex-shrink-0 mt-0.5"></i>{{ msg }}
      </div>
      {% endfor %}

      <form method="post" class="space-y-5">
        {% csrf_token %}

        <div class="space-y-1.5 anim-f1">
          <label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Username</label>
          <div class="relative">
            <i class="bi bi-person absolute pointer-events-none text-slate-400 text-base"
               style="top:50%;transform:translateY(-50%);left:14px;"></i>
            <input name="username" type="text" required autocomplete="username" autocapitalize="none"
                   placeholder="Enter your username"
                   class="w-full h-12 rounded-xl glass-input text-slate-800 placeholder-slate-300 text-sm font-medium focus:outline-none"
                   style="padding-left:42px;padding-right:16px;">
          </div>
        </div>

        <div class="space-y-1.5 anim-f2">
          <label class="text-[10px] font-extrabold uppercase tracking-widest text-slate-500">Password</label>
          <div class="relative">
            <i class="bi bi-lock absolute pointer-events-none text-slate-400 text-base"
               style="top:50%;transform:translateY(-50%);left:14px;"></i>
            <input name="password" type="password" required autocomplete="current-password"
                   placeholder="••••••••"
                   class="w-full h-12 rounded-xl glass-input text-slate-800 placeholder-slate-300 text-sm font-medium focus:outline-none"
                   style="padding-left:42px;padding-right:16px;">
          </div>
        </div>

        <button type="submit"
                class="anim-btn w-full h-12 rounded-xl font-bold text-sm text-white glass-btn-primary flex items-center justify-center gap-2 mt-1">
          <i class="bi bi-box-arrow-in-right text-base"></i>
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
