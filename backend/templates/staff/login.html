{% extends "base.html" %}
{% block title %}Staff Login{% endblock %}
{% block body %}
<div class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  
  <div class="w-full max-w-sm relative z-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-emerald-500 to-teal-400 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-2xl shadow-emerald-500/25 border border-white/20 animate-pulse" style="animation-duration: 4s;">
        <span class="text-3xl">🍽️</span>
      </div>
      <h1 class="text-2xl font-bold text-slate-800 dark:text-white mb-1 tracking-tight">Staff Portal</h1>
      <p class="text-slate-500 dark:text-slate-400 text-xs font-semibold uppercase tracking-wider">Sign in to manage orders</p>
    </div>
    
    <div class="glass-panel rounded-3xl p-6 shadow-2xl border border-white/25 dark:border-white/10">
      {% for msg in messages %}
      <div class="mb-4 bg-red-500/10 border border-red-500/20 text-red-600 dark:text-red-400 text-xs font-bold px-4 py-3 rounded-2xl">{{ msg }}</div>
      {% endfor %}
      
      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-650 dark:text-slate-300 uppercase tracking-wider">Username</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 text-xs">👤</span>
            <input name="username" type="text" required autocomplete="username" autocapitalize="none" placeholder="Enter username"
              class="w-full h-11 rounded-2xl glass-input bg-white/30 dark:bg-slate-900/30 border border-slate-350/30 dark:border-white/5 text-slate-850 dark:text-white placeholder-slate-400 pl-9 pr-4 text-sm focus:outline-none focus:ring-4 focus:ring-emerald-500/10 transition-all duration-300">
          </div>
        </div>
        
        <div class="space-y-2">
          <label class="text-xs font-bold text-slate-650 dark:text-slate-300 uppercase tracking-wider">Password</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400 text-xs">🔒</span>
            <input name="password" type="password" required autocomplete="current-password" placeholder="Enter password"
              class="w-full h-11 rounded-2xl glass-input bg-white/30 dark:bg-slate-900/30 border border-slate-350/30 dark:border-white/5 text-slate-850 dark:text-white placeholder-slate-400 pl-9 pr-4 text-sm focus:outline-none focus:ring-4 focus:ring-emerald-500/10 transition-all duration-300">
          </div>
        </div>
        
        <button type="submit"
          class="w-full bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-700 hover:to-teal-600 text-white rounded-2xl h-12 font-bold transition-all duration-300 active:scale-[0.98] shadow-lg shadow-emerald-500/20 mt-2 border border-white/10">
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
