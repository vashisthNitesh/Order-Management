services:
  # ── Django Backend ────────────────────────────────────────────────────
  - type: web
    name: restaurant-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_eKG6sCT7Ujrq@ep-dry-grass-aph0lp0o-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://restaurant-frontend.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://restaurant-backend.onrender.com"

  # ── Next.js Frontend ──────────────────────────────────────────────────
  - type: web
    name: restaurant-frontend
    runtime: node
    rootDir: frontend
    buildCommand: "npm install --legacy-peer-deps && npm run build"
    startCommand: "npx next start -p $PORT"
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: NEXT_PUBLIC_API_URL
        value: "https://restaurant-backend.onrender.com/api"
      - key: NEXT_PUBLIC_MEDIA_URL
        value: "https://restaurant-backend.onrender.com"
      - key: NEXT_PUBLIC_DEFAULT_RESTAURANT_ID
        value: "1"
