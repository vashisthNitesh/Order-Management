services:
  # ── Django Backend (serves all web templates) ─────────────────────────
  - type: web
    name: restaurant-backend
    runtime: python
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 120"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_eKG6sCT7Ujrq@ep-dry-grass-aph0lp0o-pooler.c-7.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://restaurant-backend.onrender.com"
      - key: ALLOWED_HOSTS
        value: "restaurant-backend.onrender.com,localhost,127.0.0.1"
